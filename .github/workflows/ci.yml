name: Salesforce CI/CD Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - release

jobs:
  # Stage 1: CI — runs on every Pull Request targeting main
  validate-and-test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Authenticate to Salesforce Org
        run: |
          echo "${{ secrets.SF_AUTH_URL }}" > ./SF_AUTH_URL.txt
          sf org login sfdx-url --sfdx-url-file ./SF_AUTH_URL.txt --alias ciOrg --set-default
          rm ./SF_AUTH_URL.txt

      - name: Validate Deploy and Run Tests
        run: |
          sf project deploy validate --source-dir force-app --test-level RunLocalTests --target-org ciOrg

  # Stage 2: CD to QA — runs automatically when code merges to main
  deploy-to-qa:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Authenticate to QA Org
        run: |
          echo "${{ secrets.SF_AUTH_URL }}" > ./SF_AUTH_URL.txt
          sf org login sfdx-url --sfdx-url-file ./SF_AUTH_URL.txt --alias qaOrg --set-default
          rm ./SF_AUTH_URL.txt

      - name: Deploy to QA
        run: |
          sf project deploy start --source-dir force-app --test-level RunLocalTests --target-org qaOrg

  # Stage 3: CD to Production — runs when code merges to release branch
  deploy-to-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Authenticate to Production Org
        run: |
          echo "${{ secrets.SF_AUTH_URL }}" > ./SF_AUTH_URL.txt
          sf org login sfdx-url --sfdx-url-file ./SF_AUTH_URL.txt --alias prodOrg --set-default
          rm ./SF_AUTH_URL.txt

      - name: Deploy to Production
        run: |
          sf project deploy start --source-dir force-app --test-level RunLocalTests --target-org prodOrg